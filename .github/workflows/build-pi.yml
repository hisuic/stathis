name: Build for Raspberry Pi

on:
  push:
    branches: [ main ] # mainブランチにpushされたら自動実行
  workflow_dispatch:   # GitHubの画面から手動実行も可能にする

permissions:
  contents: write # Releaseの作成に必要

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross (高速インストール)
        uses: taiki-e/install-action@cross

      - name: Build for Raspberry Pi
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Create or Update 'latest' Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Pi Build
          files: target/aarch64-unknown-linux-gnu/release/stathis 
          prerelease: true
